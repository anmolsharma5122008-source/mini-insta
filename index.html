<!DOCTYPE html>
<html>
<head>
  <title>Mini Instagram</title>
</head>
<body>

<h1>📸 Mini Instagram</h1>

<input id="username" placeholder="Your name">
<input id="postInput" placeholder="Write a post">
<button onclick="addPost()">Post</button>

<div id="feed"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
// 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_APP.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Add post
function addPost() {
  let user = document.getElementById("username").value || "Anonymous";
  let text = document.getElementById("postInput").value;

  if(text.trim() === "") return;

  db.collection("posts").add({
    user: user,
    text: text,
    time: Date.now()
  });

  document.getElementById("postInput").value = "";
}

// Load posts in real-time
db.collection("posts").orderBy("time", "desc")
.onSnapshot(snapshot => {
  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  snapshot.forEach(doc => {
    let post = doc.data();

    let div = document.createElement("div");
    div.innerHTML = `
      <p><b>${post.user}</b></p>
      <p>${post.text}</p>
      <hr>
    `;

    feed.appendChild(div);
  });
});
</script>

</body>
</html>
